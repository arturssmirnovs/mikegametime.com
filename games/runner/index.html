<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Runner - MikeGameTime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a0f00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 800px;
            padding: 0 10px;
        }
        .header a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover { color: #fff; }
        h1 { font-size: 28px; color: #f59e0b; flex: 1; text-align: center; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .stats span { color: #999; }
        .stats strong { color: #f59e0b; }
        canvas {
            border: 2px solid #3a2a10;
            border-radius: 8px;
        }
        .controls-hint {
            margin-top: 12px;
            color: #555;
            font-size: 13px;
        }
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #start-overlay.hidden { display: none; }
        #start-overlay h2 { font-size: 48px; margin-bottom: 10px; }
        #start-overlay p { color: #999; margin-bottom: 20px; font-size: 18px; }
        #start-overlay .score-msg { font-size: 24px; color: #f59e0b; margin-bottom: 10px; }
        .play-btn {
            padding: 14px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }
        .play-btn:hover { filter: brightness(1.15); }
    </style>
</head>
<body>

<div class="header">
    <a href="../index.html">&larr; Games</a>
    <h1>🏃 Desert Runner</h1>
</div>

<div class="stats">
    <span>Score: <strong id="score">0</strong></span>
    <span>Best: <strong id="best">0</strong></span>
</div>

<canvas id="game" width="750" height="300"></canvas>
<p class="controls-hint">Space, Up arrow, or Click/Tap to jump</p>

<div id="start-overlay">
    <h2>🏃</h2>
    <p id="overlay-msg">Jump over obstacles!</p>
    <div class="score-msg hidden" id="final-score-msg"></div>
    <button class="play-btn" id="play-btn">Play</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const GROUND = H - 50;

let best = parseInt(localStorage.getItem('runner-best') || '0');
document.getElementById('best').textContent = best;

let player, obstacles, clouds, score, speed, gameOver, frameId;
let particles = [];

function init() {
    player = {
        x: 80,
        y: GROUND,
        w: 30,
        h: 50,
        vy: 0,
        jumping: false,
        frame: 0,
        frameTimer: 0,
    };
    obstacles = [];
    clouds = [];
    particles = [];
    score = 0;
    speed = 5;
    gameOver = false;
    document.getElementById('score').textContent = 0;

    // Initial clouds
    for (let i = 0; i < 4; i++) {
        clouds.push({
            x: Math.random() * W,
            y: 30 + Math.random() * 60,
            w: 40 + Math.random() * 60,
            speed: 0.3 + Math.random() * 0.5,
        });
    }
}

function jump() {
    if (gameOver) return;
    if (!player.jumping) {
        player.vy = -14;
        player.jumping = true;
    }
}

function spawnObstacle() {
    const types = ['cactus-small', 'cactus-tall', 'bird'];
    const type = types[Math.floor(Math.random() * types.length)];
    let obs;
    if (type === 'cactus-small') {
        obs = { x: W + 20, y: GROUND, w: 20, h: 35, type };
    } else if (type === 'cactus-tall') {
        obs = { x: W + 20, y: GROUND - 15, w: 25, h: 50, type };
    } else {
        obs = { x: W + 20, y: GROUND - 50 - Math.random() * 40, w: 30, h: 25, type, wingFrame: 0 };
    }
    obstacles.push(obs);
}

function update() {
    if (gameOver) return;

    score++;
    speed = 5 + Math.floor(score / 200) * 0.5;
    document.getElementById('score').textContent = Math.floor(score / 5);

    // Player physics
    player.vy += 0.8;
    player.y += player.vy;
    if (player.y >= GROUND) {
        player.y = GROUND;
        player.vy = 0;
        player.jumping = false;
    }

    // Run animation
    if (!player.jumping) {
        player.frameTimer++;
        if (player.frameTimer > 6) {
            player.frameTimer = 0;
            player.frame = (player.frame + 1) % 2;
        }
    }

    // Spawn obstacles
    const lastObs = obstacles[obstacles.length - 1];
    const minGap = 250 - speed * 8;
    if (!lastObs || lastObs.x < W - (minGap + Math.random() * 200)) {
        spawnObstacle();
    }

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.x -= speed;
        if (obs.type === 'bird') {
            obs.wingFrame = (obs.wingFrame || 0) + 0.1;
        }
        if (obs.x + obs.w < -20) {
            obstacles.splice(i, 1);
            continue;
        }

        // Collision (with some forgiveness)
        const px = player.x + 5;
        const py = player.y - player.h + 5;
        const pw = player.w - 10;
        const ph = player.h - 5;
        if (px < obs.x + obs.w - 4 &&
            px + pw > obs.x + 4 &&
            py < obs.y + obs.h - 4 &&
            py + ph > obs.y) {
            endGame();
            return;
        }
    }

    // Clouds
    for (const c of clouds) {
        c.x -= c.speed;
        if (c.x + c.w < 0) {
            c.x = W + 20;
            c.y = 30 + Math.random() * 60;
        }
    }

    // Dust particles while running
    if (!player.jumping && score % 4 === 0) {
        particles.push({
            x: player.x,
            y: GROUND,
            vx: -1 - Math.random() * 2,
            vy: -Math.random() * 2,
            life: 15,
            size: 2 + Math.random() * 3,
        });
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function draw() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0f00');
    grad.addColorStop(0.5, '#2d1a00');
    grad.addColorStop(0.8, '#4a2800');
    grad.addColorStop(1, '#5a3a10');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Sun
    ctx.beginPath();
    ctx.arc(W - 100, 50, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#f59e0b';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W - 100, 50, 40, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(245, 158, 11, 0.15)';
    ctx.fill();

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    for (const c of clouds) {
        ctx.beginPath();
        ctx.ellipse(c.x + c.w / 2, c.y, c.w / 2, 12, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    // Far mountains
    ctx.fillStyle = '#1a1000';
    ctx.beginPath();
    ctx.moveTo(0, GROUND);
    for (let x = 0; x <= W; x += 60) {
        ctx.lineTo(x, GROUND - 30 - Math.sin(x * 0.008) * 25 - Math.cos(x * 0.015) * 15);
    }
    ctx.lineTo(W, GROUND);
    ctx.closePath();
    ctx.fill();

    // Ground
    ctx.fillStyle = '#3a2a10';
    ctx.fillRect(0, GROUND, W, H - GROUND);

    // Ground line
    ctx.strokeStyle = '#5a4a20';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND);
    ctx.lineTo(W, GROUND);
    ctx.stroke();

    // Ground details
    ctx.fillStyle = '#4a3a15';
    for (let x = ((-score * speed / 5) % 80); x < W; x += 80) {
        ctx.fillRect(x, GROUND + 10, 30, 2);
    }
    for (let x = ((-score * speed / 5 + 40) % 120); x < W; x += 120) {
        ctx.fillRect(x, GROUND + 25, 15, 2);
    }

    // Particles
    for (const p of particles) {
        ctx.globalAlpha = p.life / 15;
        ctx.fillStyle = '#8a7a50';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Obstacles
    for (const obs of obstacles) {
        if (obs.type === 'cactus-small') {
            drawCactus(obs.x, obs.y, obs.w, obs.h);
        } else if (obs.type === 'cactus-tall') {
            drawCactus(obs.x, obs.y, obs.w, obs.h);
            // Arms
            ctx.fillStyle = '#2d5a1a';
            ctx.fillRect(obs.x - 8, obs.y + 15, 10, 5);
            ctx.fillRect(obs.x - 8, obs.y + 10, 5, 10);
            ctx.fillRect(obs.x + obs.w - 2, obs.y + 20, 10, 5);
            ctx.fillRect(obs.x + obs.w + 3, obs.y + 15, 5, 10);
        } else if (obs.type === 'bird') {
            // Bird body
            ctx.fillStyle = '#666';
            ctx.fillRect(obs.x + 5, obs.y + 10, 20, 10);
            // Wings
            const wingY = Math.sin(obs.wingFrame * 3) * 8;
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.moveTo(obs.x + 10, obs.y + 12);
            ctx.lineTo(obs.x, obs.y + wingY);
            ctx.lineTo(obs.x + 15, obs.y + 12);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(obs.x + 18, obs.y + 12);
            ctx.lineTo(obs.x + 30, obs.y + wingY);
            ctx.lineTo(obs.x + 22, obs.y + 12);
            ctx.fill();
            // Eye
            ctx.fillStyle = '#fff';
            ctx.fillRect(obs.x + 22, obs.y + 11, 3, 3);
            // Beak
            ctx.fillStyle = '#f59e0b';
            ctx.fillRect(obs.x + 25, obs.y + 13, 5, 3);
        }
    }

    // Player
    drawPlayer();
}

function drawCactus(x, y, w, h) {
    ctx.fillStyle = '#2d6a1a';
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 4);
    ctx.fill();
    // Highlight
    ctx.fillStyle = '#3a8a25';
    ctx.fillRect(x + 3, y + 3, 3, h - 6);
}

function drawPlayer() {
    const px = player.x;
    const py = player.y;

    // Shadow
    if (!player.jumping) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(px + 15, GROUND + 2, 18, 4, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    // Body
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.roundRect(px + 5, py - 45, 20, 25, 5);
    ctx.fill();

    // Head
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(px + 15, py - 50, 10, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 19, py - 52, 3, 3);

    // Mouth
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 18, py - 46, 5, 2);

    // Legs
    ctx.strokeStyle = '#d97706';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';

    if (player.jumping) {
        // Tucked legs
        ctx.beginPath();
        ctx.moveTo(px + 10, py - 20);
        ctx.lineTo(px + 5, py - 10);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px + 20, py - 20);
        ctx.lineTo(px + 25, py - 10);
        ctx.stroke();
    } else {
        // Running legs
        const legAngle = player.frame === 0 ? 8 : -8;
        ctx.beginPath();
        ctx.moveTo(px + 10, py - 20);
        ctx.lineTo(px + 10 - legAngle, py);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px + 20, py - 20);
        ctx.lineTo(px + 20 + legAngle, py);
        ctx.stroke();
    }

    // Arms
    ctx.strokeStyle = '#d97706';
    ctx.lineWidth = 3;
    const armSwing = player.jumping ? -10 : (player.frame === 0 ? 8 : -8);
    ctx.beginPath();
    ctx.moveTo(px + 8, py - 38);
    ctx.lineTo(px - 2 + armSwing, py - 28);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 22, py - 38);
    ctx.lineTo(px + 32 - armSwing, py - 28);
    ctx.stroke();
}

function endGame() {
    gameOver = true;
    cancelAnimationFrame(frameId);
    const finalScore = Math.floor(score / 5);
    if (finalScore > best) {
        best = finalScore;
        localStorage.setItem('runner-best', best);
        document.getElementById('best').textContent = best;
    }
    const overlay = document.getElementById('start-overlay');
    overlay.classList.remove('hidden');
    document.getElementById('overlay-msg').textContent = 'Game Over!';
    const finalMsg = document.getElementById('final-score-msg');
    finalMsg.classList.remove('hidden');
    finalMsg.textContent = 'Score: ' + finalScore;
    document.getElementById('play-btn').textContent = 'Play Again';
}

function gameLoop() {
    if (gameOver) return;
    update();
    draw();
    frameId = requestAnimationFrame(gameLoop);
}

function startGame() {
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('final-score-msg').classList.add('hidden');
    init();
    cancelAnimationFrame(frameId);
    gameLoop();
}

document.getElementById('play-btn').addEventListener('click', startGame);

document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') {
        e.preventDefault();
        if (gameOver) { startGame(); return; }
        jump();
    }
});

canvas.addEventListener('click', () => {
    if (gameOver) { startGame(); return; }
    jump();
});

// Initial draw
init();
draw();
</script>
</body>
</html>
