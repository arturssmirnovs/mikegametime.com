<script>'use strict';

// ═══ CONSTANTS ═══════════════════════════════
const T=32,WW=400,WH=130,SURFACE=0.45;
const GRAVITY=0.45,JUMP_VEL=-9.5,MOVE_SPEED=3.5,REACH=5;
const ARROW_GRAV=0.18,ARROW_SPEED=9;

// ═══ SOUND SYSTEM ════════════════════════════
const AC=typeof AudioContext!=='undefined'?new AudioContext():null;
let sndOn=true,walkTick=0,ambientTimer=180;
function snd(name){
  if(!AC||!sndOn)return;
  if(AC.state==='suspended')AC.resume();
  const t=AC.currentTime;
  function o(f,type,dur,vol){
    const oc=AC.createOscillator(),g=AC.createGain();
    oc.connect(g);g.connect(AC.destination);oc.type=type;oc.frequency.value=f;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    oc.start(t);oc.stop(t+dur);
  }
  function sl(f0,f1,type,dur,vol){
    const oc=AC.createOscillator(),g=AC.createGain();
    oc.connect(g);g.connect(AC.destination);oc.type=type;
    oc.frequency.setValueAtTime(f0,t);oc.frequency.exponentialRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    oc.start(t);oc.stop(t+dur);
  }
  switch(name){
    case'mine':   o(80,'square',0.1,0.1);break;
    case'place':  o(200,'square',0.07,0.13);break;
    case'jump':   sl(280,440,'sine',0.15,0.18);break;
    case'land':   o(55,'square',0.08,0.1);break;
    case'hurt':   sl(220,70,'sawtooth',0.25,0.2);break;
    case'die':    sl(160,35,'sawtooth',0.7,0.28);break;
    case'craft':  sl(450,700,'sine',0.1,0.14);break;
    case'arrow':  sl(900,500,'sine',0.06,0.1);break;
    case'btn':    o(440,'sine',0.04,0.07);break;
    case'lava':{
      const bub=(delay,f)=>{
        const oc=AC.createOscillator(),g=AC.createGain();
        oc.connect(g);g.connect(AC.destination);oc.type='sine';
        oc.frequency.setValueAtTime(f*0.5,t+delay);
        oc.frequency.exponentialRampToValueAtTime(f,t+delay+0.07);
        g.gain.setValueAtTime(0,t+delay);
        g.gain.linearRampToValueAtTime(0.09,t+delay+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.16);
        oc.start(t+delay);oc.stop(t+delay+0.2);
      };
      bub(0,140+Math.random()*80);
      bub(0.11,170+Math.random()*70);
      bub(0.22,120+Math.random()*90);
      break;}
    case'zombie': sl(80,50,'sawtooth',0.35,0.14);break;
    case'creeper':sl(110,55,'square',0.5,0.18);break;
    case'explode':{
      const dur=0.75,sz=AC.sampleRate*dur|0,buf=AC.createBuffer(1,sz,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/sz,1.2);
      const src=AC.createBufferSource(),g=AC.createGain();
      src.buffer=buf;src.connect(g);g.connect(AC.destination);
      g.gain.setValueAtTime(0.45,t);src.start(t);
      break;
    }
  }
}

// ═══ GAME STATE ══════════════════════════════
let gameState='menu'; // menu|playing|paused|dead|saves|friends
let invOpen=false, craftSize=2;

// ═══ BLOCK/ITEM DATA ═════════════════════════
const BD=[
  {n:'Air',          c:null,      h:0,    d:0,  placeable:true},   //0
  {n:'Grass',        c:'#7B5C39', h:60,   d:2,  placeable:true},   //1
  {n:'Dirt',         c:'#8B6040', h:60,   d:2,  placeable:true},   //2
  {n:'Stone',        c:'#9E9E9E', h:180,  d:3,  placeable:true},   //3
  {n:'Coal Ore',     c:'#9E9E9E', h:200,  d:4,  placeable:true},   //4
  {n:'Iron Ore',     c:'#9E9E9E', h:240,  d:5,  placeable:true},   //5
  {n:'Log',          c:'#5D4037', h:90,   d:6,  placeable:true},   //6
  {n:'Leaves',       c:'#2E7D32', h:25,   d:0,  placeable:true},   //7
  {n:'Sand',         c:'#F9E07A', h:45,   d:8,  placeable:true},   //8
  {n:'Bedrock',      c:'#263238', h:1e9,  d:0,  placeable:true},   //9
  {n:'Planks',       c:'#D4A55A', h:80,   d:10, placeable:true},   //10
  {n:'Gravel',       c:'#78909C', h:50,   d:11, placeable:true},   //11
  {n:'Gold Ore',     c:'#9E9E9E', h:280,  d:12, placeable:true},   //12
  {n:'Torch',        c:'#FF8C00', h:5,    d:13, placeable:true},   //13
  {n:'Craft Table',  c:'#8B6040', h:80,   d:14, placeable:true},   //14
  {n:'Stick',        c:'#8B6040', h:0,    d:0,  placeable:false},  //15
  {n:'Wood Pickaxe', c:'#A0826D', h:0,    d:0,  placeable:false, tool:'pick',  mineSpeed:2},  //16
  {n:'Stone Pickaxe',c:'#9E9E9E', h:0,    d:0,  placeable:false, tool:'pick',  mineSpeed:4},  //17
  {n:'Iron Pickaxe', c:'#B0C4DE', h:0,    d:0,  placeable:false, tool:'pick',  mineSpeed:8},  //18
  {n:'Wood Sword',   c:'#A0826D', h:0,    d:0,  placeable:false, tool:'sword', dmg:2},        //19
  {n:'Stone Sword',  c:'#9E9E9E', h:0,    d:0,  placeable:false, tool:'sword', dmg:3},        //20
  {n:'Iron Sword',   c:'#B0C4DE', h:0,    d:0,  placeable:false, tool:'sword', dmg:4},        //21
  {n:'Lava',         c:'#E64A19', h:1e9,  d:0,  placeable:false},                              //22
];
const B={AIR:0,GRASS:1,DIRT:2,STONE:3,COAL:4,IRON:5,LOG:6,LEAVES:7,SAND:8,
         BEDROCK:9,PLANKS:10,GRAVEL:11,GOLD_ORE:12,TORCH:13,CRAFT_TABLE:14,
         STICK:15,WOOD_PICK:16,STONE_PICK:17,IRON_PICK:18,WOOD_SWORD:19,STONE_SWORD:20,IRON_SWORD:21,LAVA:22};

// ═══ CANVAS ══════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;snapCamera();});

// ═══ TEXTURES ════════════════════════════════
function makeTex(id){
  const c=document.createElement('canvas'); c.width=T; c.height=T;
  const g=c.getContext('2d'); const bd=BD[id]; if(!bd.c) return null;
  g.fillStyle=bd.c; g.fillRect(0,0,T,T);
  switch(id){
    case B.GRASS:
      g.fillStyle='#4CAF50';g.fillRect(0,0,T,7);
      g.fillStyle='#2E7D32'; for(let i=2;i<T-2;i+=4)g.fillRect(i,0,2,4);
      g.fillStyle='#6B4520'; for(let i=0;i<6;i++)g.fillRect(4+i*5,12+(i%3)*5,2,2);
      break;
    case B.DIRT:
      g.fillStyle='#6B4520'; for(let i=0;i<8;i++)g.fillRect(3+i*4,4+(i%4)*7,2,2);
      break;
    case B.STONE:
      g.fillStyle='#BDBDBD';g.fillRect(1,1,T-2,T-2);
      g.fillStyle='#9E9E9E';g.fillRect(5,8,9,1);g.fillRect(14,16,11,1);g.fillRect(4,22,8,1);g.fillRect(19,6,7,1);
      g.fillStyle='#757575';g.fillRect(0,0,T,1);g.fillRect(0,0,1,T);
      break;
    case B.COAL:
      g.fillStyle='#BDBDBD';g.fillRect(1,1,T-2,T-2);
      g.fillStyle='#757575';g.fillRect(0,0,T,1);g.fillRect(0,0,1,T);
      g.fillStyle='#1A1A1A';g.fillRect(5,5,6,6);g.fillRect(17,9,5,5);g.fillRect(9,19,7,6);g.fillRect(20,20,5,5);
      break;
    case B.IRON:
      g.fillStyle='#BDBDBD';g.fillRect(1,1,T-2,T-2);
      g.fillStyle='#757575';g.fillRect(0,0,T,1);g.fillRect(0,0,1,T);
      g.fillStyle='#E07A4A';g.fillRect(6,7,5,5);g.fillRect(18,12,6,4);g.fillRect(10,21,5,5);
      break;
    case B.GOLD_ORE:
      g.fillStyle='#BDBDBD';g.fillRect(1,1,T-2,T-2);
      g.fillStyle='#757575';g.fillRect(0,0,T,1);g.fillRect(0,0,1,T);
      g.fillStyle='#FFD700';g.fillRect(6,6,5,5);g.fillRect(18,11,5,5);g.fillRect(10,20,6,5);
      break;
    case B.LOG:
      g.fillStyle='#3E2723';g.fillRect(0,0,4,T);g.fillRect(T-4,0,4,T);
      g.fillStyle='#795548';g.fillRect(4,0,T-8,T);
      g.fillStyle='#6D4C41'; for(let y=5;y<T;y+=6)g.fillRect(4,y,T-8,1);
      break;
    case B.LEAVES:
      g.fillStyle='#1B5E20';g.fillRect(0,0,T,1);g.fillRect(0,0,1,T);
      g.fillStyle='#388E3C'; for(let i=0;i<8;i++)g.fillRect((i*7)%T,(i*5+3)%T,5,5);
      break;
    case B.SAND:
      g.fillStyle='#EDD46A'; for(let i=0;i<10;i++)g.fillRect((i*7+2)%T,(i*5+1)%T,4,3);
      break;
    case B.BEDROCK:
      g.fillStyle='#37474F';g.fillRect(0,0,T,T);
      g.fillStyle='#263238';g.fillRect(0,0,T/2-1,T/2-1);g.fillRect(T/2+1,T/2+1,T/2-1,T/2-1);
      g.fillStyle='#546E7A';g.fillRect(T/4,T/4,T/4,T/4);g.fillRect(3*T/4-T/8,T/8,T/4,T/4);
      break;
    case B.PLANKS:
      g.fillStyle='#C8975A';g.fillRect(0,0,T,T/2-1);
      g.fillStyle='#D4A55A';g.fillRect(0,T/2+1,T,T/2-1);
      g.fillStyle='#8D6030';g.fillRect(0,T/2-1,T,2);g.fillRect(T/2,0,2,T/2-1);g.fillRect(T/4,T/2+1,2,T/2-1);
      break;
    case B.GRAVEL:
      g.fillStyle='#90A4AE';
      [3,4,12,8,22,3,6,18,19,16,26,22,8,27].forEach((v,i,a)=>{if(i%2===0)g.fillRect(v,a[i+1],4,4);});
      break;
    case B.TORCH:
      g.fillStyle='#8B6040';g.fillRect(T/2-2,T/2,4,T/2-2);
      g.fillStyle='#FF6F00';g.fillRect(T/2-3,T/2-6,6,8);
      g.fillStyle='#FFEB3B';g.fillRect(T/2-1,T/2-8,3,5);
      g.fillStyle='#FFF';g.fillRect(T/2,T/2-7,1,3);
      break;
    case B.CRAFT_TABLE:
      g.fillStyle='#A0522D';g.fillRect(0,0,T,T);
      g.fillStyle='#8B4513';g.fillRect(0,T/2-1,T,2);g.fillRect(T/2-1,0,2,T);
      g.fillStyle='#6D4C41';g.fillRect(2,2,T-4,T-4);
      g.fillStyle='#5D3A1A';
      g.fillRect(2,T/2-1,T-4,2);g.fillRect(T/2-1,2,2,T-4);
      g.fillStyle='#8B6040';
      g.fillRect(5,5,8,2);g.fillRect(T-13,5,8,2);
      g.fillRect(5,T-7,8,2);g.fillRect(T-13,T-7,8,2);
      break;
    case B.STICK:{
      g.fillStyle='rgba(0,0,0,0.5)';g.fillRect(0,0,T,T);
      g.fillStyle='#8D6E63';g.fillRect(T*0.42,T*0.08,5,T*0.84);
      g.fillStyle='#6D4C41';g.fillRect(T*0.42,T*0.08,2,T*0.84);
      break;}
    case B.WOOD_PICK:{
      g.fillStyle='rgba(0,0,0,0.5)';g.fillRect(0,0,T,T);
      g.fillStyle='#8B6040';g.fillRect(T*0.42,T*0.38,5,T*0.54);
      g.fillStyle='#A1887F';
      g.fillRect(4,7,T-8,5);g.fillRect(4,7,5,9);g.fillRect(T-9,7,5,9);
      g.fillStyle='#6D4C41';g.fillRect(T/2-2,12,4,4);
      break;}
    case B.STONE_PICK:{
      g.fillStyle='rgba(0,0,0,0.5)';g.fillRect(0,0,T,T);
      g.fillStyle='#8B6040';g.fillRect(T*0.42,T*0.38,5,T*0.54);
      g.fillStyle='#9E9E9E';g.fillRect(4,7,T-8,5);g.fillRect(4,7,5,9);g.fillRect(T-9,7,5,9);
      break;}
    case B.IRON_PICK:{
      g.fillStyle='rgba(0,0,0,0.5)';g.fillRect(0,0,T,T);
      g.fillStyle='#8B6040';g.fillRect(T*0.42,T*0.38,5,T*0.54);
      g.fillStyle='#B0C4DE';g.fillRect(4,7,T-8,5);g.fillRect(4,7,5,9);g.fillRect(T-9,7,5,9);
      g.fillStyle='#CFD8DC';g.fillRect(5,8,T-10,3);
      break;}
    case B.WOOD_SWORD:{
      g.fillStyle='rgba(0,0,0,0.5)';g.fillRect(0,0,T,T);
      g.fillStyle='#8B6040';g.fillRect(T/2-2,T*0.55,5,T*0.38);
      g.fillStyle='#A0522D';g.fillRect(T/2-5,T*0.44,12,4);
      g.fillStyle='#D7B896';g.fillRect(T/2-3,T*0.08,7,T*0.37);
      g.fillStyle='#F5E6D3';g.fillRect(T/2-1,T*0.08,3,T*0.32);
      break;}
    case B.STONE_SWORD:{
      g.fillStyle='rgba(0,0,0,0.5)';g.fillRect(0,0,T,T);
      g.fillStyle='#8B6040';g.fillRect(T/2-2,T*0.55,5,T*0.38);
      g.fillStyle='#616161';g.fillRect(T/2-5,T*0.44,12,4);
      g.fillStyle='#9E9E9E';g.fillRect(T/2-3,T*0.08,7,T*0.37);
      g.fillStyle='#E0E0E0';g.fillRect(T/2-1,T*0.08,3,T*0.32);
      break;}
    case B.IRON_SWORD:{
      g.fillStyle='rgba(0,0,0,0.5)';g.fillRect(0,0,T,T);
      g.fillStyle='#8B6040';g.fillRect(T/2-2,T*0.55,5,T*0.38);
      g.fillStyle='#78909C';g.fillRect(T/2-5,T*0.44,12,4);
      g.fillStyle='#B0C4DE';g.fillRect(T/2-3,T*0.08,7,T*0.37);
      g.fillStyle='#E8EAF6';g.fillRect(T/2-1,T*0.08,3,T*0.32);
      break;}
    case B.LAVA:{
      const gr=g.createLinearGradient(0,0,T,T);
      gr.addColorStop(0,'#BF360C');gr.addColorStop(0.45,'#E64A19');
      gr.addColorStop(0.75,'#FF6F00');gr.addColorStop(1,'#FF8F00');
      g.fillStyle=gr;g.fillRect(0,0,T,T);
      g.fillStyle='#FFCA28';
      g.fillRect(3,4,5,4);g.fillRect(16,2,6,5);g.fillRect(9,14,5,5);g.fillRect(20,18,6,4);g.fillRect(5,22,7,4);
      g.fillStyle='#FF8F00';
      g.fillRect(7,8,8,6);g.fillRect(14,20,9,6);g.fillRect(0,16,6,8);
      g.fillStyle='#8D1E00';
      g.fillRect(0,T/3|0,T,2);g.fillRect(T/2|0,0,2,T/3|0);g.fillRect(T/4|0,T/2|0,T/2,1);
      break;}
  }
  if(id<15){g.strokeStyle='rgba(0,0,0,0.18)';g.lineWidth=1;g.strokeRect(0.5,0.5,T-1,T-1);}
  return c;
}
const TEX={};
for(let i=1;i<BD.length;i++) TEX[i]=makeTex(i);

// ═══ WORLD GENERATION ════════════════════════
let world=[], worldSeed=0;
function h(n){const v=Math.sin(n*0.7539+worldSeed*0.0013)*48271.7;return v-Math.floor(v);}
function snoise(x,sc){const i=Math.floor(x/sc),f=(x/sc)-i,u=f*f*(3-2*f);return h(i)*(1-u)+h(i+1)*u;}
function getHeight(x){return Math.round(WH*SURFACE+(snoise(x,48)-0.5)*18+(snoise(x,22)-0.5)*9+(snoise(x,10)-0.5)*4);}
function initWorld(){
  worldSeed=Math.random()*99999|0;
  world=[];
  for(let x=0;x<WW;x++) world[x]=new Uint8Array(WH);
  for(let x=0;x<WW;x++){
    const s=getHeight(x);
    for(let y=0;y<WH;y++){
      if(y===WH-1)           world[x][y]=B.BEDROCK;
      else if(y===s)         world[x][y]=B.GRASS;
      else if(y>s&&y<s+4)    world[x][y]=B.DIRT;
      else if(y>=s+4&&y<WH-1){
        const r=Math.random();
        if(r<0.025)               world[x][y]=B.COAL;
        else if(r<0.04&&y>s+12)   world[x][y]=B.IRON;
        else if(r<0.046&&y>s+20)  world[x][y]=B.GOLD_ORE;
        else if(r<0.052&&y>s+8)   world[x][y]=B.GRAVEL;
        else                      world[x][y]=B.STONE;
      }
    }
  }
  const seaY=Math.round(WH*SURFACE);
  for(let x=0;x<WW;x++){
    const s=getHeight(x);
    if(Math.abs(s-seaY)<=3) for(let y=s;y<Math.min(s+4,WH-1);y++)
      if(world[x][y]===B.GRASS||world[x][y]===B.DIRT) world[x][y]=B.SAND;
  }
  for(let x=4;x<WW-4;x++){
    if(Math.random()<0.055){
      const s=getHeight(x);
      if(world[x][s]===B.GRASS){
        const th=4+(Math.random()*3|0);
        for(let i=1;i<=th;i++) if(s-i>=0) world[x][s-i]=B.LOG;
        const ly=s-th;
        for(let lx=-2;lx<=2;lx++) for(let dy=-2;dy<=1;dy++){
          const wx=x+lx,wy=ly+dy;
          if(wx>=0&&wx<WW&&wy>=0&&wy<WH&&world[wx][wy]===B.AIR) world[wx][wy]=B.LEAVES;
        }
      }
    }
  }
  // ── Cave tunnels (worm algorithm) ──────────
  for(let w=0;w<24;w++){
    let cx=(5+Math.random()*(WW-10))|0;
    const surf=getHeight(cx);
    let cy=(surf+6+Math.random()*(WH-surf-12))|0;
    const steps=(70+Math.random()*130)|0;
    const r=(1+Math.random()*2.2)|0;
    let ang=Math.random()*Math.PI*2;
    for(let s=0;s<steps;s++){
      ang+=(Math.random()-0.5)*0.55;
      for(let bx=-r;bx<=r;bx++) for(let by=-r;by<=r;by++){
        if(bx*bx+by*by<=r*r){
          const wx=cx+bx,wy=cy+by;
          if(wx>=1&&wx<WW-1&&wy>surf+2&&wy<WH-2&&world[wx][wy]!==B.BEDROCK)
            world[wx][wy]=B.AIR;
        }
      }
      cx=Math.max(2,Math.min(WW-3,cx+(Math.cos(ang)*1.8)|0));
      cy=Math.max(surf+3,Math.min(WH-3,cy+(Math.sin(ang)*0.7)|0));
    }
  }
  // ── Cave entrances on hillsides ───────────
  for(let e=0;e<7;e++){
    const ex=(10+Math.random()*(WW-20))|0;
    const surf=getHeight(ex);
    const surfL=getHeight(ex-3),surfR=getHeight(ex+3);
    // Only place entrance on a hillside (terrain rises nearby)
    if(Math.abs(surfL-surf)<2&&Math.abs(surfR-surf)<2) continue;
    // Carve downward starting one block BELOW the surface grass (so ground stays)
    for(let dy=1;dy<16;dy++){
      const r=dy<5?2:1; // 2-wide near top, 1-wide deeper
      for(let dx=-r;dx<=r;dx++){
        const wx=ex+dx,wy=surf+dy;
        if(wx>=1&&wx<WW-1&&wy>surf&&wy<WH-2&&world[wx][wy]!==B.BEDROCK)
          world[wx][wy]=B.AIR;
      }
    }
  }
  // ── Lava pools in deep caves ───────────────
  const deepY=Math.round(WH*SURFACE)+28;
  for(let x=1;x<WW-1;x++){
    for(let y=WH-2;y>=deepY;y--){
      if(world[x][y]===B.AIR&&world[x][y+1]!==B.AIR&&world[x][y+1]!==B.LAVA){
        if(Math.random()<0.1){
          world[x][y]=B.LAVA;
          for(let dx=-4;dx<=4;dx++){
            const lx=x+dx;
            if(lx>=1&&lx<WW-1&&world[lx][y]===B.AIR&&world[lx][y+1]!==B.AIR)
              world[lx][y]=B.LAVA;
          }
        }
      }
    }
  }
}

let inv=[],bag=[],craftSlots=[],craftResult={id:0,n:0},heldItem=null;
let selSlot=0;
function mkSlot(){return {id:0,n:0};}
function initInv(){
  inv=Array.from({length:9},mkSlot);
  bag=Array.from({length:27},mkSlot);
  craftSlots=Array.from({length:9},mkSlot);
  craftResult={id:0,n:0}; heldItem=null; selSlot=0;
  inv[0]={id:B.PLANKS,n:20}; inv[1]={id:B.DIRT,n:20}; inv[2]={id:B.TORCH,n:10};
}
function addInv(id,n=1){
  if(!id) return;
  for(let k=0;k<n;k++){
    let placed=false;
    for(const arr of [inv,bag]){
      for(let i=0;i<arr.length;i++) if(arr[i].id===id&&arr[i].n<64){arr[i].n++;placed=true;break;}
      if(placed) break;
      for(let i=0;i<arr.length;i++) if(!arr[i].n){arr[i]={id,n:1};placed=true;break;}
      if(placed) break;
    }
  }
}

function matchShaped(r,grid,size){
  const ps=r.ps;
  for(let oy=0;oy<=size-ps;oy++) for(let ox=0;ox<=size-ps;ox++){
    let ok=true;
    for(let y=0;y<ps&&ok;y++) for(let x=0;x<ps&&ok;x++)
      if((r.pat[y*ps+x]||0)!==(grid[(oy+y)*size+ox+x].id||0)) ok=false;
    if(ok) for(let y=0;y<size&&ok;y++) for(let x=0;x<size&&ok;x++){
      const inP=x>=ox&&x<ox+ps&&y>=oy&&y<oy+ps;
      if(!inP&&(grid[y*size+x].id||0)!==0) ok=false;
    }
    if(ok) return true;
  }
  return false;
}
function matchShapeless(r,grid){
  const need={};r.ing.forEach(i=>need[i.id]=i.n);
  const have={};grid.forEach(s=>{if(s.id)have[s.id]=(have[s.id]||0)+s.n;});
  return Object.entries(need).every(([id,n])=>(have[id]||0)>=n)&&
         grid.every(s=>!s.id||r.ing.some(i=>i.id===+s.id));
}
function findRecipe(){
  const size=craftSize,grid=craftSlots.slice(0,size*size);
  for(const r of RECIPES){
    if(r.table&&size<3) continue;
    if(r.type==='shapeless'&&matchShapeless(r,grid)) return r;
    if(r.type==='shaped'  &&matchShaped(r,grid,size)) return r;
  }
  return null;
}
function checkRecipe(){const r=findRecipe();craftResult=r?{...r.result}:{id:0,n:0};}
function consumeRecipe(r){
  const size=craftSize,grid=craftSlots;
  if(r.type==='shapeless'){
    const need={};r.ing.forEach(i=>need[i.id]=i.n);
    for(let i=0;i<size*size;i++) if(grid[i].id&&need[grid[i].id]>0){
      need[grid[i].id]--; grid[i].n--; if(!grid[i].n)grid[i].id=0;
    }
  } else {
    const ps=r.ps;
    for(let oy=0;oy<=size-ps;oy++) for(let ox=0;ox<=size-ps;ox++){
      let ok=true;
      for(let y=0;y<ps&&ok;y++) for(let x=0;x<ps&&ok;x++)
        if((r.pat[y*ps+x]||0)!==(grid[(oy+y)*size+ox+x].id||0)) ok=false;
      if(ok){
        for(let y=0;y<ps;y++) for(let x=0;x<ps;x++) if(r.pat[y*ps+x]){
          const idx=(oy+y)*size+ox+x; grid[idx].n--; if(!grid[idx].n)grid[idx].id=0;
        }
        return;
      }
    }
  }
}
function collectCraft(){
  if(!craftResult.id) return;
  if(heldItem&&(heldItem.id!==craftResult.id||heldItem.n+craftResult.n>64)) return;
  const r=findRecipe(); if(!r) return;
  if(!heldItem) heldItem={...craftResult};
  else heldItem.n+=craftResult.n;
  consumeRecipe(r); checkRecipe();
  snd('craft');
}
function closeInv(){
  for(let i=0;i<craftSize*craftSize;i++) if(craftSlots[i].id){addInv(craftSlots[i].id,craftSlots[i].n);craftSlots[i]=mkSlot();}
  if(heldItem){addInv(heldItem.id,heldItem.n);heldItem=null;}
  craftResult={id:0,n:0}; invOpen=false; craftSize=2;
}

const SAVE_KEY='mineblk2d_saves_v1';
function wEnc(){
  const a=new Uint8Array(WW*WH);
  for(let x=0;x<WW;x++) for(let y=0;y<WH;y++) a[x*WH+y]=world[x][y];
  let s=''; for(let i=0;i<a.length;i++) s+=String.fromCharCode(a[i]);
  return btoa(s);
}
function wDec(b64){
  const s=atob(b64); world=[];
  for(let x=0;x<WW;x++){
    world[x]=new Uint8Array(WH);
    for(let y=0;y<WH;y++) world[x][y]=s.charCodeAt(x*WH+y);
  }
}

let friendsList=JSON.parse(localStorage.getItem('mineblk2d_fl')||'[]');
function saveFriendsList(){localStorage.setItem('mineblk2d_fl',JSON.stringify(friendsList));}
function addFriend(name,code){
  name=name.trim();code=code.trim().toUpperCase();
  if(!name||code.length<4){friendsMsg='Enter a name and a valid room code!';return false;}
  if(friendsList.find(f=>f.code===code)){friendsMsg='That code is already in your list!';return false;}
  friendsList.push({name,code});saveFriendsList();
  friendsMsg='Friend "'+name+'" added!';return true;
}
function removeFriend(i){friendsList.splice(i,1);saveFriendsList();}
let addFriendStep=false;
function wEncPeer(){return wEnc();}
function createRoom(){
  if(typeof Peer==='undefined'){friendsMsg='WebRTC not supported in this browser';return;}
  if(myPeer){try{myPeer.destroy();}catch(e){} myPeer=null;}
  roomCode=Math.random().toString(36).substr(2,6).toUpperCase();
  isHost=true; peerConns=[]; remotes={};
  friendsMsg='Creating room...';
  try{
    myPeer=new Peer('mineblk2d_'+roomCode.toLowerCase(),{debug:0});
    myPeer.on('open',()=>{friendsMsg='Room ready! Code: '+roomCode;startNameBeacon();});
    myPeer.on('connection',conn=>{
      if(peerConns.length>=MAX_PEERS){conn.close();return;}
      peerConns.push(conn); setupConn(conn);
      conn.on('open',()=>{conn.send({t:'world',data:wEncPeer(),dayTime,seed:worldSeed});});
    });
    myPeer.on('error',e=>{friendsMsg='Error: '+e.type;});
  }catch(e){friendsMsg='Could not create room: '+e.message;}
}
function joinRoom(code){
  if(typeof Peer==='undefined'){friendsMsg='WebRTC not supported';return;}
  code=code.trim().toUpperCase(); if(!code||code.length<4){friendsMsg='Enter a valid room code!';return;}
  if(myPeer){try{myPeer.destroy();}catch(e){} myPeer=null;}
  isHost=false; peerConns=[]; remotes={}; roomCode=code;
  friendsMsg='Connecting to '+code+'...';
  try{
    myPeer=new Peer({debug:0});
    myPeer.on('open',()=>{
      const conn=myPeer.connect('mineblk2d_'+code.toLowerCase());
      if(!conn){friendsMsg='Could not connect — check the code!';return;}
      peerConns=[conn]; setupConn(conn);
    });
    myPeer.on('error',e=>{friendsMsg='Error: '+e.type+' — wrong code?';});
  }catch(e){friendsMsg='Could not join room';}
}
function setupConn(conn){
  conn.on('data',d=>handlePeerData(d,conn));
  conn.on('close',()=>{
    delete remotes[conn.peer];
    peerConns=peerConns.filter(c=>c!==conn);
  });
}
function handlePeerData(d,conn){
  switch(d.t){
    case'world':
      try{
        wDec(d.data); dayTime=d.dayTime||0.25;
        initInv(); spawnPlayer(); snapCamera();
        enemies=[]; arrows=[]; explosions=[]; spawnTimer=300;
        player.score=0; player.health=player.maxHealth; player.iframes=0;
        selSlot=0; invOpen=false; gameState='playing';
        friendsMsg='Connected! Room: '+roomCode;
        codeIn.style.display='none';
      }catch(e){friendsMsg='World sync failed: '+e.message;}
      break;
    case'pos':
      remotes[conn.peer]={x:d.x,y:d.y,f:d.f,ws:d.ws,t:Date.now()};
      if(isHost) for(const c of peerConns) if(c!==conn) try{c.send(d);}catch(e){}
      break;
    case'blk':
      if(d.tx>=0&&d.tx<WW&&d.ty>=0&&d.ty<WH) world[d.tx][d.ty]=d.bid;
      if(isHost) for(const c of peerConns) if(c!==conn) try{c.send(d);}catch(e){}
      break;
  }
}
function broadcastBlock(tx,ty,bid){
  if(!peerConns.length) return;
  const d={t:'blk',tx,ty,bid};
  for(const c of peerConns) try{c.send(d);}catch(e){}
}
function updateMultiplayer(){
  if(!peerConns.length) return;
  if(++posTimer>=3){
    posTimer=0;
    const d={t:'pos',x:player.x,y:player.y,f:player.facing,ws:player.walkFrame};
    for(const c of peerConns) try{c.send(d);}catch(e){}
  }
}

    if(Date.now()-r.t>5000) continue;

    ctx.fillStyle='#C2185B';ctx.fillRect(sx+3,sy+PH*0.67,8,PH*0.33);ctx.fillRect(sx+PW-11,sy+PH*0.67,8,PH*0.33);

    ctx.fillText('FRIEND',sx+PW/2,sy-8);ctx.textAlign='left';
  }
}

    else if(gameState==='profile'){bioIn.style.display='none';gameState='menu';}
    else if(gameState==='skin'){gameState='profile';}
    else if(gameState==='saves'||gameState==='friends'||gameState==='rules'){
      codeIn.style.display='none';
      gameState='menu';
    }
  }
  if(!invOpen&&e.code.startsWith('Digit')){
    const n=+e.code[5]-1; if(n>=0&&n<9) selSlot=n;
  }
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
canvas.addEventListener('mousedown',e=>{
  if(e.button===0){
    mouse.left=true;
    if(invOpen){handleInvClick(false);return;}
    if(gameState==='menu')    handleMenuClick();
    else if(gameState==='paused')  handlePauseClick();
    else if(gameState==='dead')    handleDeadClick();
    else if(gameState==='saves')   handleSavesClick();
    else if(gameState==='profile') handleProfileClick();
    else if(gameState==='skin')    handleSkinClick();
    else if(gameState==='friends') handleFriendsClick();
    else if(gameState==='rules')   {if(btnHit('rulesback')){snd('btn');gameState='menu';}}
  }
  if(e.button===2&&invOpen){handleInvClick(true);e.preventDefault();return;}
  if(e.button===2&&gameState==='playing'&&!invOpen){
    const {tx,ty}=getTile();
    if(inReach(tx,ty)&&tx>=0&&tx<WW&&ty>=0&&ty<WH&&world[tx][ty]===B.CRAFT_TABLE){
      craftSize=3; invOpen=true;
    } else placeBlock();
  }
  e.preventDefault();
});
canvas.addEventListener('mouseup',e=>{
  if(e.button===0){mouse.left=false;if(!invOpen)player.mineTarget=null;}
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{
  if(!invOpen){selSlot=((selSlot+(e.deltaY>0?1:-1))+9)%9;}
  e.preventDefault();
},{passive:false});

// ═══ BUTTON HIT-TEST SYSTEM ══════════════════
const btns={};
function drawBtn(id,label,x,y,w,h,ca,cb){
  btns[id]={x,y,w,h};
  const hov=mouse.x>x&&mouse.x<x+w&&mouse.y>y&&mouse.y<y+h;
  ctx.fillStyle=hov?cb:ca; ctx.fillRect(x,y,w,h);
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(x,y,w,3);ctx.fillRect(x,y,3,h);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(x,y+h-3,w,3);ctx.fillRect(x+w-3,y,3,h);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
  ctx.fillStyle='#FFF';ctx.font='10px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.shadowColor='#000';ctx.shadowBlur=4;ctx.fillText(label,x+w/2,y+h/2+4);ctx.shadowBlur=0;
}
function btnHit(id){const b=btns[id];return b&&mouse.x>b.x&&mouse.x<b.x+b.w&&mouse.y>b.y&&mouse.y<b.y+b.h;}

// ═══ INVENTORY CLICK HANDLING ════════════════
function getLayout(){
  const SZ=42,GAP=4,STEP=SZ+GAP;
  const PAD=14;
  const craftCols=craftSize,craftRows=craftSize;
  const craftW=craftCols*STEP-GAP,craftH=craftRows*STEP-GAP;
  const craftSecH=craftH+PAD*2+8;
  const titleH=36;
  const mainH=3*STEP-GAP,hotH=SZ;
  const panW=9*STEP-GAP+PAD*2;
  const panH=titleH+craftSecH+8+mainH+8+hotH+PAD;
  const px=(canvas.width-panW)/2|0;
  const py=Math.max(8,(canvas.height-panH)/2|0);
  const craftX=px+PAD;
  const craftY=py+titleH+PAD;
  const arrX=craftX+craftW+12;
  const resX=arrX+34;
  const resY=craftY+(craftH-SZ)/2;
  const mainY=craftY+craftSecH+4;
  const hotY=mainY+mainH+10;
  const slots={craft:[],result:{x:resX,y:resY,w:SZ,h:SZ},main:[],hotbar:[]};
  for(let r=0;r<craftRows;r++) for(let c=0;c<craftCols;c++)
    slots.craft.push({x:craftX+c*STEP,y:craftY+r*STEP,w:SZ,h:SZ,i:r*craftCols+c});
  for(let r=0;r<3;r++) for(let c=0;c<9;c++)
    slots.main.push({x:px+PAD+c*STEP,y:mainY+r*STEP,w:SZ,h:SZ,i:r*9+c});
  for(let c=0;c<9;c++)
    slots.hotbar.push({x:px+PAD+c*STEP,y:hotY,w:SZ,h:SZ,i:c});
  return {px,py,panW,panH,craftX,craftY,craftW,craftH,craftSecH,arrX,titleH,SZ,GAP,STEP,PAD,mainY,hotY,slots};
}
function hitR(mx,my,r){return mx>r.x&&mx<r.x+r.w&&my>r.y&&my<r.y+r.h;}
function clickSlot(arr,idx){
  if(!heldItem){
    if(arr[idx].n>0){heldItem={...arr[idx]};arr[idx]=mkSlot();}
  } else {
    if(!arr[idx].id||arr[idx].id===heldItem.id){
      const sp=64-(arr[idx].n||0),take=Math.min(heldItem.n,sp);
      if(!arr[idx].id) arr[idx].id=heldItem.id;
      arr[idx].n=(arr[idx].n||0)+take; heldItem.n-=take;
      if(!heldItem.n) heldItem=null;
    } else { const tmp={...arr[idx]};arr[idx]={...heldItem};heldItem=tmp.n?tmp:null; }
  }
}
// Right-click: pick up half a stack, or place one item
function clickSlotRight(arr,idx){
  if(!heldItem){
    if(arr[idx].n>0){
      const half=Math.ceil(arr[idx].n/2);
      heldItem={id:arr[idx].id,n:half};
      arr[idx].n-=half;
      if(!arr[idx].n) arr[idx].id=0;
    }
  } else {
    if(!arr[idx].id||arr[idx].id===heldItem.id){
      if(arr[idx].n<64){
        if(!arr[idx].id) arr[idx].id=heldItem.id;
        arr[idx].n=(arr[idx].n||0)+1; heldItem.n--;
        if(!heldItem.n) heldItem=null;
      }
    } else {
      const tmp={...arr[idx]};arr[idx]={...heldItem};heldItem=tmp.n?tmp:null;
    }
  }
}
function handleInvClick(right){
  const L=getLayout();
  const mx=mouse.x,my=mouse.y;
  if(hitR(mx,my,L.slots.result)){if(!right)collectCraft();return;}
  for(const s of L.slots.craft) if(hitR(mx,my,s)){right?clickSlotRight(craftSlots,s.i):clickSlot(craftSlots,s.i);checkRecipe();return;}
  for(const s of L.slots.main)  if(hitR(mx,my,s)){right?clickSlotRight(bag,s.i):clickSlot(bag,s.i);return;}
  for(const s of L.slots.hotbar)if(hitR(mx,my,s)){right?clickSlotRight(inv,s.i):clickSlot(inv,s.i);return;}
  if(!right&&(mx<L.px||mx>L.px+L.panW||my<L.py||my>L.py+L.panH)) closeInv();
}

// ═══ BLOCK INTERACTION ═══════════════════════
function getTile(){return{tx:Math.floor((mouse.x+cam.x)/T),ty:Math.floor((mouse.y+cam.y)/T)};}
function inReach(tx,ty){return Math.hypot(tx+0.5-(player.x+PW/2)/T,ty+0.5-(player.y+PH/2)/T)<=REACH;}
function placeBlock(){
  const{tx,ty}=getTile();
  if(!inReach(tx,ty)||tx<0||tx>=WW||ty<0||ty>=WH) return;
  if(world[tx][ty]!==B.AIR) return;
  const p1x=player.x/T|0,p2x=(player.x+PW-1)/T|0,p1y=player.y/T|0,p2y=(player.y+PH-1)/T|0;
  if(tx>=p1x&&tx<=p2x&&ty>=p1y&&ty<=p2y) return;
  const slot=inv[selSlot];
  if(!slot.n||!slot.id||BD[slot.id].placeable===false) return;
  world[tx][ty]=slot.id; slot.n--; if(!slot.n) slot.id=0;
  snd('place');
  broadcastBlock(tx,ty,slot.id);
}
function getMineSpeed(){
  const s=inv[selSlot]; if(!s.n) return 1;
  const bd=BD[s.id]; if(!bd||bd.tool!=='pick') return 1;
  return bd.mineSpeed||1;
}
function getAttackDmg(){
  const s=inv[selSlot]; if(!s.n) return 1;
  const bd=BD[s.id]; if(!bd||bd.tool!=='sword') return 1;
  return bd.dmg||1;
}
function updateMining(){
  if(!mouse.left||invOpen){player.mineTarget=null;return;}
  if(player.attackCd>0){player.attackCd--;player.mineTarget=null;}
  const wx=mouse.x+cam.x,wy=mouse.y+cam.y;
  for(const e of enemies){
    if(!e.dead&&wx>e.x&&wx<e.x+e.w&&wy>e.y&&wy<e.y+e.h){
      if(player.attackCd<=0){
        e.hp-=getAttackDmg(); e.iframes=20; player.attackCd=25;
        if(e.hp<=0){e.dead=true;player.score+=e.type==='skeleton'?15:e.type==='creeper'?20:10;}
      }
      player.mineTarget=null; return;
    }
  }
  const{tx,ty}=getTile();
  if(tx<0||tx>=WW||ty<0||ty>=WH||!inReach(tx,ty)){player.mineTarget=null;return;}
  const block=world[tx][ty];
  if(!block){player.mineTarget=null;return;}
  const hard=BD[block].h; if(hard>=1e8){player.mineTarget=null;return;}
  const mt=player.mineTarget;
  if(!mt||mt.tx!==tx||mt.ty!==ty) player.mineTarget={tx,ty,p:0,max:hard};
  else{
    mt.p+=getMineSpeed();
    if(mt.p>=mt.max){
      snd('mine');
      addInv(BD[block].d);
      world[tx][ty]=B.AIR;
      broadcastBlock(tx,ty,B.AIR);
      player.mineTarget=null;
    }
  }
}

// ═══ PHYSICS ═════════════════════════════════
function solid(tx,ty){
  if(tx<0||tx>=WW||ty<0||ty>=WH) return true;
  const b=world[tx][ty]; return b!==B.AIR&&b!==B.LEAVES&&b!==B.TORCH&&b!==B.LAVA;
}
function resolveEntityX(e){
  const top=Math.floor(e.y/T+0.05),bot=Math.floor((e.y+e.h-1)/T);
  if(e.vx>0){const r=Math.floor((e.x+e.w)/T);for(let ty=top;ty<=bot;ty++) if(solid(r,ty)){e.x=r*T-e.w;e.vx=0;break;}}
  else if(e.vx<0){const l=Math.floor(e.x/T);for(let ty=top;ty<=bot;ty++) if(solid(l,ty)){e.x=(l+1)*T;e.vx=0;break;}}
  e.x=Math.max(0,Math.min(WW*T-e.w,e.x));
}
function resolveEntityY(e){
  const lft=Math.floor(e.x/T),rgt=Math.floor((e.x+e.w-1)/T);
  const wasOnGround=e.onGround;
  if(e.vy>=0){const btm=Math.floor((e.y+e.h)/T);for(let tx=lft;tx<=rgt;tx++) if(solid(tx,btm)){e.y=btm*T-e.h;e.vy=0;e.onGround=true;break;}}
  else{const tp=Math.floor(e.y/T);for(let tx=lft;tx<=rgt;tx++) if(solid(tx,tp)){e.y=(tp+1)*T;e.vy=0;break;}}
  e.y=Math.max(0,Math.min(WH*T-e.h,e.y));
  if(e===player&&!wasOnGround&&e.onGround) snd('land');
}
function updatePhysics(){
  if(!invOpen){
    let dx=0;
    if(keys['ArrowLeft']||keys['KeyA'])  dx=-1;
    if(keys['ArrowRight']||keys['KeyD']) dx=1;
    if(dx){player.facing=dx;player.walkFrame+=0.22;}else{player.walkFrame=0;}
    player.vx=dx*MOVE_SPEED;
    if((keys['ArrowUp']||keys['KeyW']||keys['Space'])&&player.onGround){
      player.vy=JUMP_VEL; player.onGround=false; snd('jump');
    }
    walkTick=0;
  } else player.vx=0;
  player.vy=Math.min(player.vy+GRAVITY,18);
  if(player.iframes>0) player.iframes--;
  if(!invOpen){
    player.x+=player.vx;
    if(player.vx!==0&&player.onGround){
      const fx=player.vx>0?player.x+PW+1:player.x-1;
      const ftx=Math.floor(fx/T),fty=Math.floor((player.y+PH-1)/T);
      if(solid(ftx,fty)&&!solid(ftx,fty-1)&&!solid(ftx,fty-2)){player.vy=JUMP_VEL*0.8;player.onGround=false;}
    }
    resolveEntityX(player);
  }
  player.y+=player.vy; player.onGround=false; resolveEntityY(player);
}

// ═══ ENEMIES ═════════════════════════════════
let enemies=[],spawnTimer=300;
function mkEnemy(type,x,y){
  return{type,x,y,vx:0,vy:0,onGround:false,facing:-1,
    w:type==='creeper'?20:22,h:type==='creeper'?44:48,
    hp:type==='skeleton'?15:20,maxHp:type==='skeleton'?15:20,
    attackCd:0,shootCd:180,countdown:0,burnTimer:0,iframes:0,dead:false,sndTimer:0,
    speed:type==='zombie'?1.1:type==='creeper'?1.4:1.2};
}
function spawnEnemies(){
  if(getNightAlpha()<0.25||enemies.length>=10) return;
  if(--spawnTimer>0) return; spawnTimer=300;
  for(let a=0;a<10;a++){
    const dir=Math.random()<0.5?-1:1,dist=12+Math.random()*16;
    const sx=Math.floor(player.x/T+dir*dist);
    if(sx<2||sx>=WW-2) continue;
    const surf=getHeight(sx);
    if(surf<1||world[sx][surf]===B.AIR) continue;
    const types=['zombie','zombie','zombie','creeper','creeper','skeleton','skeleton'];
    enemies.push(mkEnemy(types[Math.random()*types.length|0],sx*T,(surf-3)*T));
    break;
  }
}
function updateEnemies(){for(let i=enemies.length-1;i>=0;i--){if(enemies[i].dead)enemies.splice(i,1);else updateOne(enemies[i]);}}
function updateOne(e){
  if(e.iframes>0) e.iframes--;
  if(e.attackCd>0) e.attackCd--;
  const pcx=player.x+PW/2,pcy=player.y+PH/2,ecx=e.x+e.w/2,ecy=e.y+e.h/2;
  const pdx=pcx-ecx,pdist=Math.hypot(pdx,pcy-ecy);
  switch(e.type){
    case 'zombie':
      e.facing=Math.sign(pdx)||1;
      e.vx=Math.abs(pdx)>T*0.4?Math.sign(pdx)*e.speed:0;
      if(pdist<T*1.4&&e.attackCd<=0){takeDamage(1);e.attackCd=70;}
      if(pdist<T*8&&++e.sndTimer>180){e.sndTimer=0;snd('zombie');}
      break;
    case 'creeper':
      e.facing=Math.sign(pdx)||1;
      if(e.countdown>0){
        e.countdown--;e.vx*=0.85;
        if(e.countdown===80) snd('creeper');
        if(e.countdown<=0){snd('explode');explode(ecx/T|0,ecy/T|0,3);e.dead=true;return;}
      }
      else if(pdist<T*2){e.countdown=90;}
      else e.vx=pdist>T?Math.sign(pdx)*e.speed:0;
      break;
    case 'skeleton':
      e.facing=Math.sign(pdx)||1;
      if(Math.abs(pdx)<T*5)      e.vx=-Math.sign(pdx)*e.speed;
      else if(Math.abs(pdx)>T*9) e.vx=Math.sign(pdx)*e.speed*0.8;
      else{e.vx*=0.85;if(Math.abs(e.vx)<0.1)e.vx=0;}
      if(--e.shootCd<=0&&pdist<T*13){fireArrow(e.x+e.w/2,e.y+e.h*0.3,pcx,pcy);e.shootCd=180;}
      break;
  }
  e.vy=Math.min(e.vy+GRAVITY,18);
  e.x+=e.vx;
  if(e.vx!==0&&e.onGround){
    const fx=e.vx>0?e.x+e.w+1:e.x-1,ftx=Math.floor(fx/T),fty=Math.floor((e.y+e.h-1)/T);
    if(solid(ftx,fty)&&!solid(ftx,fty-1)&&!solid(ftx,fty-2)){e.vy=JUMP_VEL*0.85;e.onGround=false;}
  }
  resolveEntityX(e);
  e.y+=e.vy; e.onGround=false; resolveEntityY(e);
  if(getNightAlpha()<0.05&&(e.type==='zombie'||e.type==='skeleton'))
    if(++e.burnTimer>=50){e.hp-=2;e.burnTimer=0;}
  if(e.hp<=0){e.dead=true;player.score+=e.type==='skeleton'?15:e.type==='creeper'?20:10;}
}

// ═══ ARROWS ══════════════════════════════════
let arrows=[];
function fireArrow(sx,sy,tx,ty){
  const dx=tx-sx,dy=ty-sy,dist=Math.hypot(dx,dy),t=Math.max(dist/ARROW_SPEED,1);
  arrows.push({x:sx,y:sy,vx:dx/t,vy:dy/t-0.5*ARROW_GRAV*t,alive:true});
  snd('arrow');
}
function updateArrows(){
  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i]; a.x+=a.vx; a.y+=a.vy; a.vy+=ARROW_GRAV;
    const atx=Math.floor(a.x/T),aty=Math.floor(a.y/T);
    if(atx<0||atx>=WW||aty<0||aty>=WH||solid(atx,aty)){arrows.splice(i,1);continue;}
    if(a.x>player.x&&a.x<player.x+PW&&a.y>player.y&&a.y<player.y+PH){takeDamage(1);arrows.splice(i,1);}
  }
}

// ═══ EXPLOSIONS ══════════════════════════════
let explosions=[];
function explode(cx,cy,rad){
  for(let x=cx-rad;x<=cx+rad;x++) for(let y=cy-rad;y<=cy+rad;y++)
    if(Math.hypot(x-cx,y-cy)<=rad&&x>=0&&x<WW&&y>=0&&y<WH&&world[x][y]!==B.BEDROCK)
      world[x][y]=B.AIR;
  explosions.push({x:cx*T,y:cy*T,maxR:(rad+1)*T,timer:45});
  const d=Math.hypot(player.x+PW/2-cx*T,player.y+PH/2-cy*T)/T;
  if(d<rad+1.5) takeDamage(Math.ceil((rad+1.5-d)*2.5));
  enemies.forEach(e=>{const d2=Math.hypot((e.x+e.w/2)/T-cx,(e.y+e.h/2)/T-cy);if(d2<rad+1)e.hp-=Math.ceil((rad+1-d2)*8);});
}
function updateExplosions(){for(let i=explosions.length-1;i>=0;i--) if(--explosions[i].timer<=0) explosions.splice(i,1);}

// ═══ LAVA ════════════════════════════════════
let lavaDmgTimer=0,lavaSndTimer=0,playerBurnTimer=0;
function updateLava(){
  const px1=player.x/T|0,px2=(player.x+PW-1)/T|0;
  const py1=player.y/T|0,py2=(player.y+PH-1)/T|0;
  let inLava=false;
  for(let x=px1;x<=px2&&!inLava;x++) for(let y=py1;y<=py2&&!inLava;y++)
    if(x>=0&&x<WW&&y>=0&&y<WH&&world[x][y]===B.LAVA) inLava=true;

  if(inLava){
    playerBurnTimer=600; // reset to 10s every frame in lava
    if(++lavaDmgTimer>=20){lavaDmgTimer=0;takeDamage(3);}
  } else if(playerBurnTimer>0){
    playerBurnTimer--;
    // After-burn: 1 damage every 40 frames (~1.5s between hits)
    if(++lavaDmgTimer>=40){lavaDmgTimer=0;takeDamage(1);}
  } else {
    lavaDmgTimer=0;
  }

  // Bubble sound when lava is nearby
  if(++lavaSndTimer>=100){
    lavaSndTimer=0;
    const px=player.x/T|0,py=player.y/T|0;
    for(let dx=-6;dx<=6;dx++) for(let dy=-6;dy<=6;dy++){
      const lx=px+dx,ly=py+dy;
      if(lx>=0&&lx<WW&&ly>=0&&ly<WH&&world[lx][ly]===B.LAVA){snd('lava');return;}
    }
  }
}
function drawLavaGlow(){
  const x0=Math.max(0,(cam.x/T|0)-1),x1=Math.min(WW-1,((cam.x+canvas.width)/T|0)+2);
  const y0=Math.max(0,(cam.y/T|0)-1),y1=Math.min(WH-1,((cam.y+canvas.height)/T|0)+2);
  const flicker=0.82+Math.sin(Date.now()/160)*0.18;
  ctx.save();
  for(let x=x0;x<=x1;x++) for(let y=y0;y<=y1;y++){
    if(world[x][y]!==B.LAVA) continue;
    const sx=x*T-cam.x,sy=y*T-cam.y;
    const grd=ctx.createRadialGradient(sx+T/2,sy+T/2,2,sx+T/2,sy+T/2,T*2.6);
    grd.addColorStop(0,`rgba(255,130,0,${0.5*flicker})`);
    grd.addColorStop(0.4,`rgba(255,60,0,${0.2*flicker})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;
    ctx.fillRect(sx-T*1.6,sy-T*1.6,T*4.2,T*4.2);
    // Surface shimmer
    if(Math.random()<0.25){
      ctx.fillStyle=`rgba(255,210,80,${0.25*Math.random()})`;
      ctx.fillRect(sx|0,sy|0,T,T);
    }
  }
  ctx.restore();
}

// ═══ AMBIENT SOUNDS ══════════════════════════
function sndBird(){
  if(!AC||!sndOn)return;
  if(AC.state==='suspended')AC.resume();
  const t=AC.currentTime;
  const chirp=(delay,f0,f1,dur)=>{
    const oc=AC.createOscillator(),g=AC.createGain();
    oc.connect(g);g.connect(AC.destination);oc.type='sine';
    oc.frequency.setValueAtTime(f0,t+delay);
    oc.frequency.exponentialRampToValueAtTime(f1,t+delay+dur*0.7);
    oc.frequency.exponentialRampToValueAtTime(f0*0.9,t+delay+dur);
    g.gain.setValueAtTime(0,t+delay);
    g.gain.linearRampToValueAtTime(0.13,t+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+dur);
    oc.start(t+delay);oc.stop(t+delay+dur+0.05);
  };
  // Random bird pattern: 1-3 chirps
  const n=1+(Math.random()*3|0);
  const baseF=2000+Math.random()*1200;
  for(let i=0;i<n;i++) chirp(i*0.18,baseF,baseF*1.35,0.12);
}
function sndHorror(){
  if(!AC||!sndOn)return;
  if(AC.state==='suspended')AC.resume();
  const t=AC.currentTime;
  // Low creepy drone with LFO wobble
  const oc=AC.createOscillator(),g=AC.createGain();
  const lfo=AC.createOscillator(),lg=AC.createGain();
  lfo.type='sine';lfo.frequency.value=0.4;
  lg.gain.value=18;
  lfo.connect(lg);lg.connect(oc.frequency);
  oc.connect(g);g.connect(AC.destination);
  oc.type='sawtooth';oc.frequency.value=55+Math.random()*20;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.14,t+0.8);
  g.gain.setValueAtTime(0.14,t+2.2);
  g.gain.exponentialRampToValueAtTime(0.001,t+3.5);
  lfo.start(t);oc.start(t);oc.stop(t+3.6);lfo.stop(t+3.6);
  // Distant wail on top
  const oc2=AC.createOscillator(),g2=AC.createGain();
  oc2.connect(g2);g2.connect(AC.destination);oc2.type='sine';
  const wailF=120+Math.random()*80;
  oc2.frequency.setValueAtTime(wailF,t+0.6);
  oc2.frequency.exponentialRampToValueAtTime(wailF*0.55,t+2.8);
  g2.gain.setValueAtTime(0,t+0.6);
  g2.gain.linearRampToValueAtTime(0.09,t+1.2);
  g2.gain.exponentialRampToValueAtTime(0.001,t+3.2);
  oc2.start(t+0.6);oc2.stop(t+3.3);
}
function updateAmbient(){
  if(gameState!=='playing')return;
  if(--ambientTimer>0)return;
  const night=getNightAlpha();
  if(night<0.3){
    sndBird();
    ambientTimer=(300+Math.random()*500)|0; // bird every 5-14s
  } else {
    sndHorror();
    ambientTimer=(220+Math.random()*300)|0; // horror every 4-9s
  }
}

// ═══ DAY/NIGHT ════════════════════════════════
let dayTime=0.25;
function updateDayTime(){dayTime=(dayTime+1/(60*60*8))%1;}
const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a,b)=>v<a?a:v>b?b:v;
function getSkyColor(){
  const sh=Math.sin(dayTime*Math.PI*2-Math.PI/2)*0.5+0.5;
  if(sh>0.2) return`rgb(${lerp(80,135,sh)|0},${lerp(110,206,sh)|0},${lerp(170,235,sh)|0})`;
  if(sh>0)   return`rgb(${lerp(255,80,sh/0.2)|0},${lerp(120,110,sh/0.2)|0},${lerp(0,170,sh/0.2)|0})`;
  return '#060618';
}
function getNightAlpha(){const sh=Math.sin(dayTime*Math.PI*2-Math.PI/2)*0.5+0.5;return clamp((0.25-sh)*4,0,0.72);}

// Offscreen canvas for torch lighting
const lightC=document.createElement('canvas');
lightC.width=canvas.width;lightC.height=canvas.height;
const lc=lightC.getContext('2d');
window.addEventListener('resize',()=>{lightC.width=canvas.width;lightC.height=canvas.height;});

function drawNightOverlay(){
  const a=getNightAlpha();
  if(a<=0)return;
  if(lightC.width!==canvas.width){lightC.width=canvas.width;}
  if(lightC.height!==canvas.height){lightC.height=canvas.height;}

  const flicker=0.93+Math.sin(Date.now()/160)*0.07;
  // Collect visible torches
  const x0=Math.max(0,cam.x/T|0),x1=Math.min(WW-1,(cam.x+canvas.width)/T|0+2);
  const y0=Math.max(0,cam.y/T|0),y1=Math.min(WH-1,(cam.y+canvas.height)/T|0+2);
  const torches=[];
  for(let x=x0;x<=x1;x++) for(let y=y0;y<=y1;y++){
    if(world[x][y]===B.TORCH) torches.push([x*T-cam.x+T/2|0, y*T-cam.y+T/4|0]);
  }

  // Draw warm orange glow on main canvas BEFORE dark overlay
  for(const [sx,sy] of torches){
    const r=T*7*flicker;
    const grd=ctx.createRadialGradient(sx,sy,T*0.3,sx,sy,r);
    grd.addColorStop(0,`rgba(255,180,40,${0.22*a})`);
    grd.addColorStop(0.35,`rgba(255,120,10,${0.10*a})`);
    grd.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
  }

  // Build overlay on offscreen canvas with holes cut for torches
  lc.clearRect(0,0,lightC.width,lightC.height);
  lc.fillStyle=`rgba(0,0,20,${a})`;
  lc.fillRect(0,0,lightC.width,lightC.height);

  lc.globalCompositeOperation='destination-out';
  // Torch holes
  for(const [sx,sy] of torches){
    const r=T*6*flicker;
    const grd=lc.createRadialGradient(sx,sy,T*0.4,sx,sy,r);
    grd.addColorStop(0,'rgba(0,0,0,1)');
    grd.addColorStop(0.45,'rgba(0,0,0,0.85)');
    grd.addColorStop(0.75,'rgba(0,0,0,0.4)');
    grd.addColorStop(1,'rgba(0,0,0,0)');
    lc.fillStyle=grd;lc.beginPath();lc.arc(sx,sy,r,0,Math.PI*2);lc.fill();
  }
  // Tiny ambient glow around player so they're never fully blind
  const ppx=player.x-cam.x+PW/2|0,ppy=player.y-cam.y+PH/2|0;
  const pgrd=lc.createRadialGradient(ppx,ppy,0,ppx,ppy,T*1.8);
  pgrd.addColorStop(0,'rgba(0,0,0,0.45)');pgrd.addColorStop(1,'rgba(0,0,0,0)');
  lc.fillStyle=pgrd;lc.beginPath();lc.arc(ppx,ppy,T*1.8,0,Math.PI*2);lc.fill();

  lc.globalCompositeOperation='source-over';
  ctx.drawImage(lightC,0,0);
}

// ═══ NAME BEACON (friend discovery) ══════════
let nameBeacon=null,searchPeer=null,searchResults=[],searchDone=false;
function sanitizeName(n){return n.toLowerCase().replace(/[^a-z0-9]/g,'').substr(0,14);}
function startNameBeacon(){
  if(!playerName||typeof Peer==='undefined') return;
  if(nameBeacon){try{nameBeacon.destroy();}catch(e){} nameBeacon=null;}
  const id='mineblk2d_n_'+sanitizeName(playerName);
  try{
    nameBeacon=new Peer(id,{debug:0});
    nameBeacon.on('connection',conn=>{
      conn.on('open',()=>{
        conn.send({t:'disc',room:roomCode,name:playerName,gender:playerGender,bio:playerBio});
        setTimeout(()=>{try{conn.close();}catch(e){}},4000);
      });
    });
    nameBeacon.on('error',()=>{}); // silently fail if name taken
  }catch(e){}
}
function searchByName(name){
  if(typeof Peer==='undefined'){friendsMsg='WebRTC not available';return;}
  searchResults=[];searchDone=false;
  const safe=sanitizeName(name);
  if(!safe){friendsMsg='Enter a name to search!';return;}
  friendsMsg='Searching for "'+name+'"...';
  if(searchPeer){try{searchPeer.destroy();}catch(e){} searchPeer=null;}
  try{
    searchPeer=new Peer({debug:0});
    searchPeer.on('open',()=>{
      const conn=searchPeer.connect('mineblk2d_n_'+safe,{reliable:true});
      conn.on('data',d=>{
        if(d.t==='disc'){
          searchResults.push(d);
          friendsMsg='Found '+d.name+'! Room code: '+d.room;
        }
      });
      conn.on('error',()=>{if(!searchResults.length){friendsMsg='"'+name+'" is not online right now.';}searchDone=true;});
      setTimeout(()=>{
        searchDone=true;
        if(!searchResults.length) friendsMsg='"'+name+'" is not online right now.';
        try{searchPeer.destroy();}catch(e){}searchPeer=null;
      },5000);
    });
    searchPeer.on('error',()=>{friendsMsg='"'+name+'" is not online right now.';searchDone=true;});
  }catch(e){friendsMsg='Search failed: '+e.message;searchDone=true;}
}

  ctx.fillText('WHO ARE YOU?',cx,py+36);ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(244,143,177,0.3)';ctx.beginPath();ctx.moveTo(px+16,py+48);ctx.lineTo(px+pw-16,py+48);ctx.stroke();
  // Gender prompt
  ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle='rgba(255,255,255,0.6)';ctx.textAlign='center';
  ctx.fillText('Pick your character:',cx,py+68);
  // Boy box
  const boyX=cx-185,boyY=py+78,bw=160,bh=140;
  ctx.fillStyle=playerGender==='boy'?'rgba(21,101,192,0.25)':'rgba(15,15,35,0.6)';
  ctx.fillRect(boyX,boyY,bw,bh);
  ctx.strokeStyle=playerGender==='boy'?'#42A5F5':'rgba(255,255,255,0.15)';
  ctx.lineWidth=playerGender==='boy'?3:1;ctx.strokeRect(boyX,boyY,bw,bh);
  drawProfileChar(boyX+bw/2,boyY+66,'boy',playerGender==='boy');
  ctx.font='7px "Press Start 2P",monospace';
  ctx.fillStyle=playerGender==='boy'?'#90CAF9':'rgba(255,255,255,0.4)';ctx.textAlign='center';
  ctx.fillText('👦  BOY',boyX+bw/2,boyY+128);
  btns['pgboy']={x:boyX,y:boyY,w:bw,h:bh};
  // Girl box
  const girlX=cx+25,girlY=py+78,gw=160,gh=140;
  ctx.fillStyle=playerGender==='girl'?'rgba(233,30,99,0.22)':'rgba(15,15,35,0.6)';
  ctx.fillRect(girlX,girlY,gw,gh);
  ctx.strokeStyle=playerGender==='girl'?'#F06292':'rgba(255,255,255,0.15)';
  ctx.lineWidth=playerGender==='girl'?3:1;ctx.strokeRect(girlX,girlY,gw,gh);
  drawProfileChar(girlX+gw/2,girlY+66,'girl',playerGender==='girl');
  ctx.font='7px "Press Start 2P",monospace';
  ctx.fillStyle=playerGender==='girl'?'#F48FB1':'rgba(255,255,255,0.4)';ctx.textAlign='center';
  ctx.fillText('👧  GIRL',girlX+gw/2,girlY+128);
  btns['pggirl']={x:girlX,y:girlY,w:gw,h:gh};
  // About me
  ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle='rgba(255,255,255,0.55)';ctx.textAlign='center';
  ctx.fillText('About me:',cx,py+242);
  // Bio box (HTML textarea overlaps this area when editing)
  ctx.fillStyle='rgba(8,3,18,0.9)';ctx.fillRect(cx-150,py+250,300,66);
  ctx.strokeStyle=bioIn.style.display==='block'?'#F06292':'rgba(240,98,146,0.4)';
  ctx.lineWidth=2;ctx.strokeRect(cx-150,py+250,300,66);
  if(bioIn.style.display!=='block'){
    if(playerBio){
      ctx.font='6px "Press Start 2P",monospace';ctx.fillStyle='#F8BBD9';ctx.textAlign='left';
      ctx.fillText(playerBio.substr(0,38),cx-144,py+268);
      if(playerBio.length>38) ctx.fillText(playerBio.substr(38,38),cx-144,py+284);
    } else {
      ctx.font='6px "Press Start 2P",monospace';ctx.fillStyle='rgba(255,255,255,0.2)';ctx.textAlign='center';
      ctx.fillText('click here to write about yourself...',cx,py+285);
    }
  }
  btns['pbio']={x:cx-150,y:py+250,w:300,h:66};
  // Skin editor button
  drawBtn('pskin','🎨  EDIT SKIN',cx+30,py+334,160,28,'#E65100','#FF6F00');
  // Start button
  if(playerGender){
    drawBtn('pstart','▶  START PLAYING',cx-135,py+370,270,50,'#1B5E20','#2E7D32');
  } else {
    ctx.fillStyle='rgba(25,25,25,0.55)';ctx.fillRect(cx-135,py+334,270,50);
    ctx.fillStyle='rgba(25,25,25,0.55)';ctx.fillRect(cx-135,py+370,270,50);
    ctx.strokeStyle='rgba(80,80,80,0.3)';ctx.lineWidth=1;ctx.strokeRect(cx-135,py+370,270,50);
    ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle='rgba(100,100,100,0.5)';ctx.textAlign='center';
    ctx.fillText('▶  START PLAYING',cx,py+400);
    ctx.font='6px "Press Start 2P",monospace';ctx.fillStyle='rgba(255,200,0,0.5)';
    ctx.fillText('← pick a character first',cx,py+418);
  }
  drawBtn('pback','◀  BACK TO MENU',cx-110,py+430,220,26,'#37474F','#546E7A');
  ctx.textAlign='left';
}
function handleProfileClick(){
  if(btnHit('pgboy')){snd('btn');playerGender='boy';saveProfile();}
  if(btnHit('pggirl')){snd('btn');playerGender='girl';saveProfile();}
  if(btnHit('pbio')){
    snd('btn');
    const cy=canvas.height/2,ph=430,py=(canvas.height-ph)/2|0;
    // Position textarea to overlap the bio box
    const boxTop=py+250;
    const offsetFromCenter=boxTop-cy;
    bioIn.style.transform='translate(-50%,'+offsetFromCenter+'px)';
    bioIn.value=playerBio;
    bioIn.style.display='block';bioIn.focus();
  }
  if(btnHit('pskin')){snd('btn');playerBio=bioIn.value.trim();saveProfile();bioIn.style.display='none';gameState='skin';}
  if(btnHit('pstart')&&playerGender){
    snd('btn');
    playerBio=bioIn.value.trim();saveProfile();
    bioIn.style.display='none';
    startGame();
  }
  if(btnHit('pback')){
    snd('btn');
    playerBio=bioIn.value.trim();if(playerGender)saveProfile();
    bioIn.style.display='none';gameState='menu';
  }
}

// ═══ GAME LOOP ════════════════════════════════
function update(){
  updateDayTime();
  if(gameState==='menu'||gameState==='saves'||gameState==='friends'||gameState==='rules'||gameState==='profile'||gameState==='skin'){
    menuPan=(menuPan+0.35)%(WW*T-canvas.width||1);
    cam.x=menuPan; cam.y=Math.max(0,Math.min(WH*T-canvas.height,(WH*SURFACE-4)*T-canvas.height/2));
    return;
  }
  if(gameState==='playing'){
    updateMining(); updatePhysics();
    updateEnemies(); updateArrows(); updateExplosions();
    spawnEnemies(); updateCamera(); updateMultiplayer(); updateAmbient(); updateLava();
    if(++autoSaveTimer>=10800){autoSaveTimer=0;doAutoSave();} // auto-save every 3 min
  }
}
function render(){
  ctx.fillStyle=getSkyColor();ctx.fillRect(0,0,canvas.width,canvas.height);
  drawStars(); drawWorld();
  if(gameState==='menu'){drawNightOverlay();drawMenu();return;}
  if(gameState==='profile'){drawNightOverlay();drawProfile();return;}
  if(gameState==='skin'){drawNightOverlay();drawSkin();return;}
  if(gameState==='saves'){drawNightOverlay();drawSaves();return;}
  if(gameState==='friends'){drawNightOverlay();drawFriends();return;}
  if(gameState==='rules'){drawNightOverlay();drawRules();return;}
  drawLavaGlow();
  drawExplosions(); drawArrows();
  enemies.forEach(e=>{if(!e.dead)drawEnemy(e);});
  drawRemotePlayers();
  drawBlockHighlight(); drawMineOverlay(); drawPlayer();
  drawNightOverlay(); drawHotbar(); drawHUD();
  if(invOpen) drawInventoryUI();
  if(gameState==='paused') drawPause();
  if(gameState==='dead')   drawDead();
}
function loop(){update();render();requestAnimationFrame(loop);}

// ═══ INIT ═════════════════════════════════════
initWorld(); initInv(); spawnPlayer(); snapCamera(); menuPan=cam.x;
loop();
</script>
